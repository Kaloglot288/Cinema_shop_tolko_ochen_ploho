            justify-content: center;
            height: 1000px;
            width: 840px;
            gap: 80px;
        }
        img{
            width: 230px;
            height: 200px;
        }
        .footer{
            width: 1440px;
            height: 130px;

            justify-content: center;
        }
        .svedeniaParthers{

        }
        .parthers{

        }

</head>
